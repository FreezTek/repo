    <link rel="stylesheet" href="css/styles.css">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <script src="js/theme.js" defer></script>
</head>
<body>
    <header>
        <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">Mode clair</button>
        <h1>Contact</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="cv.html">CV</a></li>

            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="bootstrap.html">Bootstrap</a></li>
        </ul>
    </nav>
    <main>
        <section>
            <h2>Me Contacter</h2>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nom *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Sujet *</label>
                    <select id="subject" name="subject" required>
                        <option value="">-- Sélectionnez un sujet --</option>
                        <option value="question">Question générale</option>
                        <option value="collaboration">Proposition de collaboration</option>
                        <option value="bug">Signaler un bug</option>
                        <option value="other">Autre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">M'ajouter à votre liste de diffusion</label>
                </div>

                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <p class="footer-left">© 2026 SOULIÉ Lucas</p>
            <div class="footer-links">
                <a href="https://fr.wikipedia.org/wiki/Boss" target="_blank" rel="noopener noreferrer" class="footer-icon" aria-label="Wikipedia">🌐</a>

            </div>
        </div>
    </footer>
</body>
</html>
